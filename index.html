<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snooze Energy | Building Sunfill™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffffff;
            --accent-color: #e2e8f0;
            --overlay: rgba(0, 0, 0, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        .hero {
            height: 100vh;
            width: 100%;
            background: linear-gradient(var(--overlay), var(--overlay)), 
                        url('background.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .logo {
            position: absolute;
            top: 40px;
            left: 40px;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 1px;
            text-transform: lowercase;
        }

        .content {
            max-width: 900px;
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .cta-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 18px 32px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid white;
        }

        .btn-primary {
            background-color: white;
            color: #1a1a1a;
        }

        .btn-primary:hover {
            background-color: transparent;
            color: white;
        }

        .btn-secondary {
            background-color: transparent;
            color: white;
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .logo { top: 20px; left: 20px; }
            h1 { margin-bottom: 30px; }
            .cta-container { flex-direction: column; width: 100%; max-width: 300px; margin: 0 auto; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="logo">snooze.energy</div>

    <section class="hero">
        <div class="content">
            <h1>Building Sunfill™ – <br>The local power platform for grid-constrained growth markets.</h1>
            
            <div class="cta-container">
                <a href="mailto:hello@sunfill.io?subject=Request Pilot" class="btn btn-primary">Request Pilot</a>
                <a href="mailto:hello@sunfill.io?subject=Partnership Inquiry" class="btn btn-secondary">Become Investor/Strategic Partner</a>
            </div>
        </div>
    </section>

</body>
</html>
